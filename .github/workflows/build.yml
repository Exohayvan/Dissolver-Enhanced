name: build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  COMMON_BRANCH: main
  COMMON_DIR: Dissolver Enhanced (Common)
  TARGET_DIR: Dissolver Enhanced (Target)

jobs:
  build-common:
    name: Build Common
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          path: ${{ env.COMMON_DIR }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 1

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - name: Build Common
        working-directory: ${{ env.COMMON_DIR }}/minecraft
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload Common artifacts
        uses: actions/upload-artifact@v4
        with:
          name: common-${{ github.sha }}
          path: ${{ env.COMMON_DIR }}/minecraft/build/libs/

  discover-version-branches:
    name: Discover Version Branches
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-22.04
    outputs:
      branches: ${{ steps.branches.outputs.branches }}
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4

      - name: Find build branches
        id: branches
        shell: bash
        run: |
          branches="$(git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -Ev '^(main|HEAD)$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "branches=${branches}" >> "$GITHUB_OUTPUT"
          echo "Discovered branches: ${branches}"

  build-all-version-branches:
    name: Build ${{ matrix.branch }}
    if: ${{ github.ref_name == 'main' && needs.discover-version-branches.outputs.branches != '[]' }}
    needs: discover-version-branches
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover-version-branches.outputs.branches) }}

    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMON_BRANCH }}
          path: ${{ env.COMMON_DIR }}

      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          path: ${{ env.TARGET_DIR }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 2

      - name: Select Java version
        id: java
        shell: bash
        run: |
          case "${{ matrix.branch }}" in
            forge-1.20.1)
              echo "version=17" >> "$GITHUB_OUTPUT"
              echo "distribution=temurin" >> "$GITHUB_OUTPUT"
              ;;
            fabric-26.1.2)
              echo "version=25" >> "$GITHUB_OUTPUT"
              echo "distribution=temurin" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "version=21" >> "$GITHUB_OUTPUT"
              echo "distribution=microsoft" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Setup Java ${{ steps.java.outputs.version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: ${{ steps.java.outputs.distribution }}

      - name: Build ${{ matrix.branch }}
        working-directory: ${{ env.TARGET_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload ${{ matrix.branch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.branch }}-${{ github.sha }}
          path: ${{ env.TARGET_DIR }}/build/libs/

  package-all-builds:
    name: Package All Builds
    if: ${{ github.ref_name == 'main' && needs.build-common.result == 'success' && needs.build-all-version-branches.result == 'success' }}
    needs:
      - build-common
      - build-all-version-branches
    runs-on: ubuntu-22.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Collect release jars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-jars

          while IFS= read -r -d '' jar; do
            relative_path="${jar#downloaded-artifacts/}"
            target_path="release-jars/${relative_path}"
            mkdir -p "$(dirname "${target_path}")"
            cp "${jar}" "${target_path}"
          done < <(find downloaded-artifacts -type f -iname '*.jar' ! -iname '*source*' -print0)

          if ! find release-jars -type f -iname '*.jar' | grep -q .; then
            echo "No non-source jars were found in downloaded artifacts." >&2
            exit 1
          fi

          zip -r "all_builds-${GITHUB_SHA}.zip" release-jars

      - name: Upload all builds zip
        uses: actions/upload-artifact@v4
        with:
          name: all_builds-${{ github.sha }}
          path: all_builds-${{ github.sha }}.zip

  build-current-version-branch:
    name: Build Current Branch
    if: ${{ github.ref_name != 'main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMON_BRANCH }}
          path: ${{ env.COMMON_DIR }}

      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: ${{ env.TARGET_DIR }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 2

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - name: Build current branch
        working-directory: ${{ env.TARGET_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload current branch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ github.sha }}
          path: ${{ env.TARGET_DIR }}/build/libs/
