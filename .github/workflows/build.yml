name: build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  COMMON_BRANCH: main
  COMMON_DIR: Dissolver Enhanced (Common)
  TARGET_DIR: Dissolver Enhanced (Target)

jobs:
  build-common:
    name: Build Common
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          path: ${{ env.COMMON_DIR }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 1

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Build Common
        working-directory: ${{ env.COMMON_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload Common artifacts
        uses: actions/upload-artifact@v4
        with:
          name: common-${{ github.sha }}
          path: ${{ env.COMMON_DIR }}/build/libs/

  discover-version-branches:
    name: Discover Version Branches
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-22.04
    outputs:
      branches: ${{ steps.branches.outputs.branches }}
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4

      - name: Find build branches
        id: branches
        shell: bash
        run: |
          branches="$(git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -Ev '^(main|HEAD)$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "branches=${branches}" >> "$GITHUB_OUTPUT"
          echo "Discovered branches: ${branches}"

  build-all-version-branches:
    name: Build ${{ matrix.branch }}
    if: ${{ github.ref_name == 'main' && needs.discover-version-branches.outputs.branches != '[]' }}
    needs: discover-version-branches
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover-version-branches.outputs.branches) }}

    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMON_BRANCH }}
          path: ${{ env.COMMON_DIR }}

      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          path: ${{ env.TARGET_DIR }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 2

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Build ${{ matrix.branch }}
        working-directory: ${{ env.TARGET_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload ${{ matrix.branch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.branch }}-${{ github.sha }}
          path: ${{ env.TARGET_DIR }}/build/libs/

  build-current-version-branch:
    name: Build Current Branch
    if: ${{ github.ref_name != 'main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Common
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMON_BRANCH }}
          path: ${{ env.COMMON_DIR }}

      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: ${{ env.TARGET_DIR }}

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4
        with:
          min-wrapper-count: 2

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Build current branch
        working-directory: ${{ env.TARGET_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon

      - name: Upload current branch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}-${{ github.sha }}
          path: ${{ env.TARGET_DIR }}/build/libs/
