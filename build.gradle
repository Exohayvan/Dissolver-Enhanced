plugins {
	id 'net.fabricmc.fabric-loom' version '1.16.1'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

def commonPropertiesFile = file("../Common/gradle.properties")
if (!commonPropertiesFile.exists()) {
	throw new GradleException("Common gradle.properties not found at ${commonPropertiesFile}. Check out the Common worktree beside this Fabric worktree.")
}

def commonProperties = new Properties()
commonPropertiesFile.withInputStream { commonProperties.load(it) }
def commonVersion = commonProperties.getProperty("common_version")
if (commonVersion == null || commonVersion.isBlank()) {
	throw new GradleException("common_version is missing from ${commonPropertiesFile}.")
}
def releaseArchiveVersion = "${project.mod_version}-${project.mod_loader_name}-mc${project.minecraft_version}-c${commonVersion}"

base {
	archivesName = project.archives_base_name
}

tasks.withType(AbstractArchiveTask).configureEach {
	archiveVersion = releaseArchiveVersion
}

test {
	useJUnitPlatform()
}

repositories {
	mavenCentral()
	maven {
		name = "Modrinth"
		url = "https://api.modrinth.com/maven"
	}
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"dissolver_enhanced" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	compileOnly "maven.modrinth:wthit:${project.wthit_version}"
	implementation "net.exohayvan:dissolver-enhanced-common:${commonVersion}"
	include "net.exohayvan:dissolver-enhanced-common:${commonVersion}"

	testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
	testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
	testImplementation 'org.assertj:assertj-core:3.26.3'
	testImplementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.12.4'
	testImplementation 'org.mockito:mockito-core:5.12.0'
	
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}
